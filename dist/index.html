      window.__artistFlowBootError = false

    <script>

        window.setTimeout(() => {

            '<p style="margin:.3rem 0">Then rerun the <strong>Deploy to GitHub Pages</strong> workflow.</p>',
            '</div>',
          ].join('')
        }, 400)
